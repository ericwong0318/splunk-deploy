---
- name: Fix Cloned VM Hostnames and Splunk ServerNames
  hosts: full
  become: yes
  tasks:
    - name: Set completely unique OS hostname based on inventory
      ansible.builtin.hostname:
        name: "{{ inventory_hostname | replace('.', '-') }}"

    - name: Update Splunk internal serverName
      ansible.builtin.command: >
        /opt/splunk/bin/splunk set servername {{ inventory_hostname | replace('.', '-') }} 
        -auth admin:{{ splunk_admin_password }}
      ignore_errors: yes

    - name: Restart Splunk to apply the new identity
      ansible.builtin.command: /opt/splunk/bin/splunk restart
